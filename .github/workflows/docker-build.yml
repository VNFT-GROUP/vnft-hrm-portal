name: Build & Push Docker Images

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_PREFIX: ${{ secrets.DOCKER_USERNAME }}/vnft

jobs:
  # ------------------------------------------
  # Step 1: Detect which apps changed
  # ------------------------------------------
  detect-changes:
    name: Detect changed apps
    runs-on: ubuntu-latest
    outputs:
      hrm: ${{ steps.filter.outputs.hrm }}
      crm: ${{ steps.filter.outputs.crm }}
      gateway: ${{ steps.filter.outputs.gateway }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect path changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            hrm:
              - 'apps/hrm/**'
              - 'docker/**'
              - 'package.json'
              - 'package-lock.json'
            crm:
              - 'apps/crm/**'
              - 'docker/**'
              - 'package.json'
              - 'package-lock.json'
            gateway:
              - 'apps/gateway/**'
              - 'docker/**'
              - 'package.json'
              - 'package-lock.json'

  # ------------------------------------------
  # Step 2: Build each app (conditional)
  # ------------------------------------------
  build-hrm:
    name: Build HRM
    needs: detect-changes
    if: needs.detect-changes.outputs.hrm == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-hrm
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push HRM
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/hrm/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_BACKEND_BASE_URL=${{ secrets.VITE_BACKEND_BASE_URL }}
            VITE_GATEWAY_URL=${{ secrets.VITE_GATEWAY_URL }}
            VITE_HRM_URL=${{ secrets.VITE_HRM_URL }}
            VITE_CRM_URL=${{ secrets.VITE_CRM_URL }}

  build-crm:
    name: Build CRM
    needs: detect-changes
    if: needs.detect-changes.outputs.crm == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-crm
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push CRM
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/crm/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_BACKEND_BASE_URL=${{ secrets.VITE_BACKEND_BASE_URL }}
            VITE_GATEWAY_URL=${{ secrets.VITE_GATEWAY_URL }}
            VITE_HRM_URL=${{ secrets.VITE_HRM_URL }}
            VITE_CRM_URL=${{ secrets.VITE_CRM_URL }}

  build-gateway:
    name: Build Gateway
    needs: detect-changes
    if: needs.detect-changes.outputs.gateway == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-gateway
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Gateway
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/gateway/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_BACKEND_BASE_URL=${{ secrets.VITE_BACKEND_BASE_URL }}
            VITE_GATEWAY_URL=${{ secrets.VITE_GATEWAY_URL }}
            VITE_HRM_URL=${{ secrets.VITE_HRM_URL }}
            VITE_CRM_URL=${{ secrets.VITE_CRM_URL }}
